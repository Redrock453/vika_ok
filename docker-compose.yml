services:
  vika_bot:
    build: .
    container_name: vika_bot
    restart: unless-stopped
    env_file: .env
    environment:
      - QDRANT_HOST=host.docker.internal
      - QDRANT_PORT=6333
    volumes:
      - hf_cache:/root/.cache
      - bot_data:/app/data
      - ssh_keys:/root/.ssh
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  hf_cache:
  bot_data:
  ssh_keys:
