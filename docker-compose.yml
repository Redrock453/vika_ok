version: "3.8"

services:
  vika_bot:
    build: .
    container_name: vika_bot
    restart: unless-stopped
    env_file: .env
    environment:
      - QDRANT_HOST=${QDRANT_HOST:-vika_qdrant}
      - QDRANT_PORT=6333
    volumes:
      - hf_cache:/root/.cache
      - bot_data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vika_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  qdrant_data:
  hf_cache:
  bot_data:
